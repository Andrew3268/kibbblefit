<!doctype html>
<html lang="ko">
<head>
  <title>사료 목록 | 키블핏</title>
  <meta name="description" content="등록된 사료 목록을 확인하세요." />
  <link rel="canonical" href="/foods/" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#5B7CFF" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="ico-paw" viewBox="0 0 24 24">
      <path d="M12 14c-2.6 0-4.8 2.2-4.8 4.6 0 1.3 1.1 2.4 2.5 2.4h4.6c1.4 0 2.5-1.1 2.5-2.4C16.8 16.2 14.6 14 12 14z"/>
      <path d="M7 10.5c.9 0 1.6-.9 1.6-2s-.7-2-1.6-2-1.6.9-1.6 2 .7 2 1.6 2zm10 0c.9 0 1.6-.9 1.6-2s-.7-2-1.6-2-1.6.9-1.6 2 .7 2 1.6 2zM9.2 6.8c.8 0 1.4-.8 1.4-1.8S10 3.2 9.2 3.2 7.8 4 7.8 5s.6 1.8 1.4 1.8zm5.6 0c.8 0 1.4-.8 1.4-1.8s-.6-1.8-1.4-1.8-1.4.8-1.4 1.8.6 1.8 1.4 1.8z"/>
    </symbol>
    <symbol id="ico-chevron-right" viewBox="0 0 24 24">
      <path d="M9 18l6-6-6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </svg>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24"><use href="#ico-paw"></use></svg>
        </span>
        <span>키블핏</span>
      </a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="/" data-path="/">홈</a>
        <a href="/foods/" data-path="/foods">사료 목록</a>
        <a href="/tools/" data-path="/tools">도구</a>
        <a href="/about/" data-path="/about">소개</a>
        <a href="/add.html" data-path="/add.html">등록</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card" style="display:flex;flex-direction:column;gap:10px">
      <h1 class="h1">사료 목록</h1>
      <p class="p">목록은 <b>/api/foods</b>에서 불러옵니다. 각 사료는 <b>상세 보기</b> / <b>수정</b>으로 바로 이동할 수 있어요.</p>
      <div class="row" style="flex-wrap:wrap">
        <a class="btn btn--brand" href="/api/foods">/api/foods (JSON)</a>
        <a class="btn" href="/add.html">새 사료 등록</a>
      </div>
    </section>

    <section class="container" style="margin-top:16px">
      <div id="foodsLoading" class="small">목록 불러오는 중…</div>
      <div id="foodsError" class="small" hidden style="color:#b00020"></div>
      <div id="foodsEmpty" class="small" hidden>아직 등록된 사료가 없어요.</div>
      <div id="foodsList" class="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:12px"></div>
    </section>
  </main>

  <footer class="footer container">
    <div class="footer__inner">
      <div>© 2026 키블핏</div>
      <div>제조사 라벨 기반으로 정보를 정리하는 참고용 가이드입니다.</div>
    </div>
  </footer>

  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/foods.js" defer></script>
</body>
</html>
