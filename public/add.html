<!doctype html>
<html lang="ko">
<head>
  <title>사료 등록 | 키블핏</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#5B7CFF" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/app.css" />
<link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ico-paw" viewBox="0 0 24 24">
    <path d="M12 14c-2.6 0-4.8 2.2-4.8 4.6 0 1.3 1.1 2.4 2.5 2.4h4.6c1.4 0 2.5-1.1 2.5-2.4C16.8 16.2 14.6 14 12 14z"/>
    <path d="M7 10.5c.9 0 1.6-.9 1.6-2s-.7-2-1.6-2-1.6.9-1.6 2 .7 2 1.6 2zm10 0c.9 0 1.6-.9 1.6-2s-.7-2-1.6-2-1.6.9-1.6 2 .7 2 1.6 2zM9.2 6.8c.8 0 1.4-.8 1.4-1.8S10 3.2 9.2 3.2 7.8 4 7.8 5s.6 1.8 1.4 1.8zm5.6 0c.8 0 1.4-.8 1.4-1.8s-.6-1.8-1.4-1.8-1.4.8-1.4 1.8.6 1.8 1.4 1.8z"/>
  </symbol>
  <symbol id="ico-chevron-right" viewBox="0 0 24 24">
    <path d="M9 18l6-6-6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
  <header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="/">
      <span class="brand__mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24"><use href="#ico-paw"></use></svg>
      </span>
      <span>키블핏</span>
    </a>
    <nav class="nav" aria-label="주요 메뉴">
      <a href="/" data-path="/">홈</a>
      <a href="/foods/" data-path="/foods">사료 목록</a>
      <a href="/tools/" data-path="/tools">도구</a>
      <a href="/about/" data-path="/about">소개</a>
      <a href="/add.html" data-path="/add.html">등록</a>
    </nav>
  </div>
</header>
<script src="/assets/js/nav.js" defer></script>
  <main class="container">
    <section class="card" style="display:flex;flex-direction:column;gap:12px">
      <h1 class="h1">사료 등록(개발용)</h1>
      <p class="p">입력 → 저장 → 바로 <b>/food/slug</b>에서 SSR 결과 확인</p>

      <div class="grid grid--2">
        <div>
          <label class="small" for="name">사료 이름</label>
          <input class="input" id="name" placeholder="예: 웰니스 코어 오리지날" />
        </div>
        <div>
          <label class="small" for="brand">브랜드</label>
          <input class="input" id="brand" placeholder="예: Wellness" />
        </div>
      </div>

      <div class="grid grid--3">
        <div>
          <label class="small" for="protein">단백질(DM %)</label>
          <input class="input" id="protein" type="number" step="1" placeholder="예: 45" />
        </div>
        <div>
          <label class="small" for="fat">지방(DM %)</label>
          <input class="input" id="fat" type="number" step="1" placeholder="예: 18" />
        </div>
        <div>
          <label class="small" for="carb">탄수화물(DM %)</label>
          <input class="input" id="carb" type="number" step="1" placeholder="예: 22" />
        </div>
      </div>

      <div>
        <label class="small" for="ingredients">원료 리스트(콤마로 구분)</label>
        <textarea id="ingredients" rows="4" placeholder="예: 닭고기, 칠면조, 닭지방, 완두, 치커리뿌리, 연어오일"></textarea>
      </div>

      <div class="row">
        <button class="btn btn--brand" id="saveBtn" type="button">저장하기</button>
        <span class="small" id="status"></span>
      </div>

      <div class="notice">
        <strong>주의</strong>
        <div class="sep"></div>
        <div class="small">운영 전에는 로그인/보호를 넣는 걸 추천합니다.</div>
      </div>
    </section>
  </main>
  <footer class="footer container">
  <div class="footer__inner">
    <div>© 2026 키블핏</div>
    <div>제조사 라벨 기반으로 정보를 정리하는 참고용 가이드입니다.</div>
  </div>
</footer>
  <script type="module" src="/assets/js/add.js"></script>
</body>
</html>
