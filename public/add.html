<!doctype html>
<html lang="ko">
<head>
  <title>사료 등록 | 키블핏</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#5B7CFF" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="ico-paw" viewBox="0 0 24 24">
      <path d="M12 14c-2.6 0-4.8 2.2-4.8 4.6 0 1.3 1.1 2.4 2.5 2.4h4.6c1.4 0 2.5-1.1 2.5-2.4C16.8 16.2 14.6 14 12 14z"/>
      <path d="M7 10.5c.9 0 1.6-.9 1.6-2s-.7-2-1.6-2-1.6.9-1.6 2 .7 2 1.6 2zm10 0c.9 0 1.6-.9 1.6-2s-.7-2-1.6-2-1.6.9-1.6 2 .7 2 1.6 2zM9.2 6.8c.8 0 1.4-.8 1.4-1.8S10 3.2 9.2 3.2 7.8 4 7.8 5s.6 1.8 1.4 1.8zm5.6 0c.8 0 1.4-.8 1.4-1.8s-.6-1.8-1.4-1.8-1.4.8-1.4 1.8.6 1.8 1.4 1.8z"/>
    </symbol>
  </svg>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/">
        <span class="brand__mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24"><use href="#ico-paw"></use></svg>
        </span>
        <span>키블핏</span>
      </a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="/" data-path="/">홈</a>
        <a href="/foods/" data-path="/foods">사료 목록</a>
        <a href="/tools/" data-path="/tools">도구</a>
        <a href="/about/" data-path="/about">소개</a>
        <a href="/add.html" data-path="/add.html">등록</a>
      </nav>
    </div>
  </header>

  <script src="/assets/js/nav.js" defer></script>

  <main class="container">
    <section class="card" style="display:flex;flex-direction:column;gap:12px">
      <h1 class="h1">사료 등록(테스트용)</h1>
      <p class="p">등록하면 <b>/food/슬러그</b> SSR 페이지가 생성됩니다. 기존 사료 수정은 <b>목록 → 수정</b> 또는 <b>/edit.html?slug=...</b>를 사용하세요.</p>

      <div class="grid grid--2">
        <div>
          <label class="small" for="name">사료명</label>
          <input class="input" id="name" placeholder="예: 웰니스 코어 오리지날" />
        </div>
        <div>
          <label class="small" for="brand">브랜드</label>
          <input class="input" id="brand" placeholder="예: Wellness" />
        </div>
      </div>

      <div class="grid grid--2">
        <div>
          <label class="small" for="life_stage">급여연령</label>
          <select class="input" id="life_stage">
            <option value="">선택</option>
            <option value="키튼">키튼</option>
            <option value="어덜트">어덜트</option>
            <option value="전연령">전연령</option>
            <option value="시니어">시니어</option>
          </select>
        </div>
        <div>
          <label class="small" for="slugPreview">slug(자동)</label>
          <input class="input" id="slugPreview" disabled />
        </div>
      </div>

      <div class="sep"></div>
      <h2 class="h2">보증성분(라벨 %)</h2>

      <div class="grid grid--3">
        <div>
          <label class="small" for="crude_protein">조단백질(%)</label>
          <input class="input" id="crude_protein" type="number" step="0.1" placeholder="예: 36" />
        </div>
        <div>
          <label class="small" for="crude_fat">조지방(%)</label>
          <input class="input" id="crude_fat" type="number" step="0.1" placeholder="예: 18" />
        </div>
        <div>
          <label class="small" for="moisture">수분(%)</label>
          <input class="input" id="moisture" type="number" step="0.1" placeholder="예: 10" />
        </div>
      </div>

      <div class="grid grid--4">
        <div>
          <label class="small" for="calcium">칼슘(%)</label>
          <input class="input" id="calcium" type="number" step="0.01" placeholder="예: 1.2" />
        </div>
        <div>
          <label class="small" for="phosphorus">인(%)</label>
          <input class="input" id="phosphorus" type="number" step="0.01" placeholder="예: 1.0" />
        </div>
        <div>
          <label class="small" for="ash">조회분(%)</label>
          <input class="input" id="ash" type="number" step="0.1" placeholder="예: 8" />
        </div>
        <div>
          <label class="small" for="crude_fiber">조섬유(%)</label>
          <input class="input" id="crude_fiber" type="number" step="0.1" placeholder="예: 3" />
        </div>
      </div>

      <div>
        <label class="small" for="ingredients">원료 리스트(콤마로 구분)</label>
        <textarea class="input" id="ingredients" rows="4" placeholder="예: 닭고기, 칠면조, 닭지방, 완두, 치커리뿌리, 연어오일"></textarea>
      </div>

      <div class="row">
        <button class="btn btn--brand" id="saveBtn" type="button">저장하기</button>
        <span class="small" id="status"></span>
      </div>

      <div class="notice">
        <strong>안내</strong>
        <div class="sep"></div>
        <div class="small">테스트 단계에서는 누구나 수정/등록이 가능하니, 운영 전에는 접근 제어를 추천합니다.</div>
      </div>
    </section>
  </main>

  <footer class="footer container">
    <div class="footer__inner">
      <div>© 2026 키블핏</div>
      <div>제조사 라벨 기반으로 정보를 정리하는 참고용 가이드입니다.</div>
    </div>
  </footer>

  <script type="module" src="/assets/js/add.js"></script>
</body>
</html>
